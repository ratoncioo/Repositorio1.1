<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Arcade v5</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        :root {
            --green: #00ff41;
            --green-dim: #008f11;
            --green-dark: #003b0e;
            --red: #ff3131;
            --gold: #ffd700;
            --bg: #000;
        }

        body {
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            color: var(--green);
            overflow: hidden;
        }

        /* ── BACK BUTTON ── */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: transparent;
            border: 2px solid var(--green);
            color: var(--green);
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            z-index: 200;
        }
        .back-btn:hover {
            background: var(--green);
            color: #000;
            box-shadow: 0 0 15px var(--green);
        }

        /* ── HUD ── */
        #hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 420px;
            padding: 4px 6px;
            font-size: 14px;
            gap: 6px;
        }
        #hud-score { font-size: 20px; font-weight: bold; }
        #hud-leader {
            font-size: 12px;
            color: var(--green-dim);
            text-align: right;
            line-height: 1.4;
        }
        #hud-leader.beating { color: var(--gold); text-shadow: 0 0 6px var(--gold); }
        #hud-bonus {
            font-size: 11px;
            color: var(--gold);
            text-shadow: 0 0 8px var(--gold);
            min-width: 60px;
            text-align: center;
            visibility: hidden;
        }
        #hud-bonus.active { visibility: visible; }

        /* ── CANVAS WRAPPER ── */
        #game-wrapper {
            position: relative;
            border: 3px solid var(--green);
            background: var(--bg);
            box-shadow: 0 0 22px var(--green);
            transition: border-color 0.1s, box-shadow 0.1s;
        }
        #game-wrapper.wall-warn {
            border-color: var(--red);
            box-shadow: 0 0 28px var(--red);
        }
        #game-wrapper.record-flash {
            border-color: var(--gold);
            box-shadow: 0 0 40px var(--gold);
        }

        canvas { display: block; background: var(--bg); }

        /* ── OVERLAYS ── */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.93);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10; text-align: center; padding: 16px;
        }

        h1 { font-size: 32px; margin-bottom: 16px; text-shadow: 0 0 10px var(--green); }
        h1.red { color: var(--red); text-shadow: 0 0 10px var(--red); }

        .btn {
            background: transparent; border: 2px solid var(--green); color: var(--green);
            padding: 9px 18px; font-size: 16px; cursor: pointer; transition: 0.2s;
            text-transform: uppercase; font-weight: bold; margin-top: 10px;
            font-family: 'Courier New', Courier, monospace;
        }
        .btn:hover { background: var(--green); color: #000; }
        .btn:disabled { border-color: #333; color: #333; cursor: not-allowed; }
        .btn-red { border-color: var(--red); color: var(--red); }
        .btn-red:hover { background: var(--red); color: #000; }

        /* ── NAME ENTRY (5 chars) ── */
        .name-entry { display: flex; gap: 10px; margin: 16px 0 6px; }
        .letter-box {
            width: 36px; height: 48px;
            border-bottom: 3px solid var(--green);
            font-size: 32px;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.1s, color 0.1s;
        }
        .letter-box.active {
            color: #fff;
            border-color: #fff;
            text-shadow: 0 0 8px #fff;
        }
        .name-hint { font-size: 11px; color: var(--green-dim); margin-bottom: 8px; }

        /* ── LEADERBOARD ── */
        #leaderboard-list { list-style: none; margin: 10px 0; width: 90%; text-align: left; }
        #leaderboard-list li {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 17px; margin-bottom: 8px;
            border-bottom: 1px dashed var(--green-dim); padding-bottom: 5px;
        }
        #leaderboard-list li .rank { color: var(--green-dim); margin-right: 8px; font-size: 13px; }
        #leaderboard-list li.gold-row { color: var(--gold); border-color: var(--gold); }

        /* ── RECORD BANNER ── */
        #record-banner {
            position: fixed; top: 0; left: 0; width: 100%;
            background: var(--gold); color: #000;
            text-align: center; font-size: 16px; font-weight: bold;
            padding: 8px; z-index: 100;
            transform: translateY(-100%);
            transition: transform 0.4s;
            font-family: 'Courier New', Courier, monospace;
        }
        #record-banner.show { transform: translateY(0); }

        /* ── D-PAD ── */
        #controls {
            display: grid;
            grid-template-columns: repeat(3, 56px);
            gap: 8px;
            margin-top: 14px;
        }
        .ctrl-btn {
            width: 56px; height: 56px; background: #111;
            border: 2px solid #2a2a2a; color: #aaa;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; border-radius: 50%; cursor: pointer;
            touch-action: manipulation; transition: 0.1s;
        }
        .ctrl-btn:active, .ctrl-btn.pressed {
            background: var(--green); color: #000; border-color: var(--green);
        }
        #up { grid-column: 2; } #left { grid-column: 1; }
        #right { grid-column: 3; } #down { grid-column: 2; }
    </style>
</head>
<body>

<button class="back-btn" onclick="goHome()">← VOLVER</button>

<div id="record-banner">🏆 ¡NUEVO RÉCORD MUNDIAL! 🏆</div>

<div id="hud">
    <div id="hud-score">SCORE: <span id="val">000</span></div>
    <div id="hud-bonus"></div>
    <div id="hud-leader">#1: ---<br><span id="hud-leader-name">???</span></div>
</div>

<div id="game-wrapper">
    <canvas id="game"></canvas>

    <!-- START -->
    <div id="start-screen" class="overlay">
        <h1>SNAKE ARCADE</h1>
        <button class="btn" onclick="showLeaderboard()">VER RANKING GLOBAL</button>
        <button class="btn" onclick="startGame()">▶ INSERT COIN</button>
    </div>

    <!-- GAME OVER -->
    <div id="over-screen" class="overlay" style="display:none">
        <h1 class="red">GAME OVER</h1>
        <p>PUNTUACIÓN: <span id="final-score">000</span></p>
        <div class="name-entry" id="name-entry">
            <div class="letter-box active" id="L0">A</div>
            <div class="letter-box" id="L1">A</div>
            <div class="letter-box" id="L2">A</div>
            <div class="letter-box" id="L3">A</div>
            <div class="letter-box" id="L4">A</div>
        </div>
        <p class="name-hint">← → MOVER · ↑ ↓ CAMBIAR LETRA · EN PC ESCRIBE DIRECTO</p>
        <button class="btn" id="save-btn" onclick="saveScore()">GUARDAR EN LA NUBE</button>
        <button class="btn btn-red" onclick="resetToStart()">SALIR SIN GUARDAR</button>
    </div>

    <!-- LEADERBOARD -->
    <div id="leaderboard-screen" class="overlay" style="display:none">
        <h1>TOP 5 GLOBAL</h1>
        <ul id="leaderboard-list"></ul>
        <button class="btn" onclick="resetToStart()">VOLVER</button>
    </div>
</div>

<div id="controls">
    <div class="ctrl-btn" id="up"    onmousedown="handleDir('UP')"    ontouchstart="e=>{e.preventDefault();handleDir('UP')}">↑</div>
    <div class="ctrl-btn" id="left"  onmousedown="handleDir('LEFT')"  ontouchstart="e=>{e.preventDefault();handleDir('LEFT')}">←</div>
    <div class="ctrl-btn" id="right" onmousedown="handleDir('RIGHT')" ontouchstart="e=>{e.preventDefault();handleDir('RIGHT')}">→</div>
    <div class="ctrl-btn" id="down"  onmousedown="handleDir('DOWN')"  ontouchstart="e=>{e.preventDefault();handleDir('DOWN')}">↓</div>
</div>

<script>
// ── GO HOME ──
function goHome() {
    window.location.href = '../index.html';
}

// ═══════════════════════════════════════════════
//  FIREBASE
// ═══════════════════════════════════════════════
const firebaseConfig = {
    apiKey: "AIzaSyBbhPYtbU3ZWBEY3-ys0wsealIyBTWxt7Y",
    authDomain: "snakescore-37662.firebaseapp.com",
    projectId: "snakescore-37662",
    storageBucket: "snakescore-37662.firebasestorage.app",
    messagingSenderId: "1068045159602",
    appId: "1:1068045159602:web:8a08d2e012a8d0ea5a0dab"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
db.enablePersistence().catch(() => {});

// ── Global ranking (live) ──
let globalRanking = [];
let topScore = 0;
let topName = "???";

db.collection("leaderboard").orderBy("score","desc").limit(5).onSnapshot(snap => {
    globalRanking = [];
    snap.forEach(doc => globalRanking.push(doc.data()));
    if (globalRanking.length > 0) {
        const prev = topScore;
        topScore = globalRanking[0].score;
        topName  = globalRanking[0].name;
        updateLeaderHUD();
        if (topScore > prev && prev > 0) showRecordBanner(topName, topScore);
    }
});

// ── Bonus apples (Firebase config doc) ──
let bonusActive = false;
let bonusMultiplier = 1;
let bonusTimer = null;

db.collection("config").doc("bonus").onSnapshot(doc => {
    if (!doc.exists) return;
    const data = doc.data();
    const now = Date.now();
    if (data.active && data.until && data.until.toMillis() > now) {
        activateBonus(data.until.toMillis() - now);
    } else {
        deactivateBonus();
    }
});

function activateBonus(ms) {
    bonusActive = true;
    bonusMultiplier = 2;
    clearTimeout(bonusTimer);
    const hudBonus = document.getElementById("hud-bonus");
    hudBonus.classList.add("active");

    const tick = () => {
        const remaining = Math.max(0, bonusMs - (Date.now() - bonusStart));
        if (remaining <= 0) { deactivateBonus(); return; }
        hudBonus.textContent = `★ x2 ${Math.ceil(remaining/1000)}s`;
        bonusTimer = setTimeout(tick, 500);
    };
    const bonusStart = Date.now();
    const bonusMs = ms;
    tick();
}
function deactivateBonus() {
    bonusActive = false;
    bonusMultiplier = 1;
    clearTimeout(bonusTimer);
    const hudBonus = document.getElementById("hud-bonus");
    hudBonus.classList.remove("active");
    hudBonus.textContent = "";
}

function updateLeaderHUD() {
    const el = document.getElementById("hud-leader");
    const nameEl = document.getElementById("hud-leader-name");
    el.childNodes[0].textContent = `#1: ${topScore.toString().padStart(3,"0")}`;
    nameEl.textContent = topName;
    if (!isGameRunning) return;
    if (score > topScore) {
        el.classList.add("beating");
        el.childNodes[0].textContent = `#1: ${topScore.toString().padStart(3,"0")} ✓`;
    } else {
        el.classList.remove("beating");
    }
}

// ═══════════════════════════════════════════════
//  CANVAS & GAME VARS
// ═══════════════════════════════════════════════
const canvas = document.getElementById("game");
const ctx    = canvas.getContext("2d");
const BOX    = 16;

const rawSize = Math.min(window.innerWidth - 30, 400);
const SIZE = rawSize - (rawSize % BOX);
canvas.width  = SIZE;
canvas.height = SIZE;

const COLS = SIZE / BOX;
const ROWS = SIZE / BOX;

let snake, prevSnake, food, score, d, nextD;
let isGameRunning = false;
let isOver = false;
let lastTick = 0;
let rafId = null;
const TICK_MS = 100; // game speed

// smooth rendering
let interpProgress = 0;  // 0..1 between ticks

// ghost leader
let ghostMoves  = [];   // recorded moves of top player (simplified: we store directions)
let ghostSnake  = [];
let ghostIndex  = 0;

// ── name entry ──
let charIndex = 0;
let initials  = [65,65,65,65,65];

// ═══════════════════════════════════════════════
//  RECORD BANNER
// ═══════════════════════════════════════════════
function showRecordBanner(name, sc) {
    const banner = document.getElementById("record-banner");
    banner.textContent = `🏆 ¡${name} ROMPIÓ EL RÉCORD CON ${sc}! 🏆`;
    banner.classList.add("show");
    const wrapper = document.getElementById("game-wrapper");
    wrapper.classList.add("record-flash");
    setTimeout(() => {
        banner.classList.remove("show");
        wrapper.classList.remove("record-flash");
    }, 4000);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
function initVars() {
    const cx = Math.floor(COLS/2) * BOX;
    const cy = Math.floor(ROWS/2) * BOX;
    snake = [{x:cx, y:cy}];
    prevSnake = [{x:cx, y:cy}];
    score = 0;
    d = "RIGHT";
    nextD = "RIGHT";
    isOver = false;
    charIndex = 0;
    initials = [65,65,65,65,65];
    document.getElementById("val").innerText = "000";
    document.getElementById("save-btn").disabled = false;
    document.getElementById("save-btn").innerText = "GUARDAR EN LA NUBE";
    updateNameUI();
    spawnFood();
    updateLeaderHUD();

    // init ghost
    ghostSnake = [{x: cx - BOX*3, y: cy}];
    ghostMoves = [];
    ghostIndex = 0;
}

function spawnFood() {
    let pos;
    do {
        pos = {
            x: Math.floor(Math.random() * COLS) * BOX,
            y: Math.floor(Math.random() * ROWS) * BOX
        };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
}

// ═══════════════════════════════════════════════
//  GAME LOOP (requestAnimationFrame for smooth rendering)
// ═══════════════════════════════════════════════
function gameFrame(ts) {
    if (!isGameRunning) return;
    const elapsed = ts - lastTick;

    interpProgress = Math.min(elapsed / TICK_MS, 1);

    if (elapsed >= TICK_MS) {
        lastTick = ts;
        interpProgress = 0;
        tick();
        if (isOver) return;
    }

    render(interpProgress);
    rafId = requestAnimationFrame(gameFrame);
}

function tick() {
    d = nextD;
    prevSnake = snake.map(s => ({...s})); // snapshot before move

    let hx = snake[0].x;
    let hy = snake[0].y;
    if (d === "LEFT")  hx -= BOX;
    if (d === "RIGHT") hx += BOX;
    if (d === "UP")    hy -= BOX;
    if (d === "DOWN")  hy += BOX;

    // wall warning
    const wrapper = document.getElementById("game-wrapper");
    const headClearance = Math.min(hx, hy, SIZE - BOX - hx, SIZE - BOX - hy);
    if (headClearance < BOX * 2) {
        wrapper.classList.add("wall-warn");
    } else {
        wrapper.classList.remove("wall-warn");
    }

    // death check
    if (hx < 0 || hx >= SIZE || hy < 0 || hy >= SIZE || snake.some(s => s.x===hx && s.y===hy)) {
        wrapper.classList.remove("wall-warn");
        gameOver(); return;
    }

    const newHead = {x: hx, y: hy};

    // eat?
    const ate = (hx === food.x && hy === food.y);
    if (ate) {
        const pts = 10 * bonusMultiplier;
        score += pts;
        document.getElementById("val").innerText = score.toString().padStart(3,"0");
        updateLeaderHUD();
        spawnFood();
    } else {
        snake.pop();
    }
    snake.unshift(newHead);

    // ghost tick
    advanceGhost();
}

// ── ghost logic ──
function advanceGhost() {
    if (ghostMoves.length === 0) return;
    const gd = ghostMoves[ghostIndex % ghostMoves.length];
    ghostIndex++;
    let gh = {...ghostSnake[0]};
    if (gd === "LEFT")  gh.x -= BOX;
    if (gd === "RIGHT") gh.x += BOX;
    if (gd === "UP")    gh.y -= BOX;
    if (gd === "DOWN")  gh.y += BOX;
    // wrap ghost so it never dies
    gh.x = ((gh.x % SIZE) + SIZE) % SIZE;
    gh.y = ((gh.y % SIZE) + SIZE) % SIZE;
    ghostSnake.unshift(gh);
    const maxLen = Math.max(5, Math.floor(topScore / 10));
    if (ghostSnake.length > maxLen) ghostSnake.pop();
}

// ── load ghost from Firestore (stored moves of top player) ──
function loadGhostMoves() {
    db.collection("config").doc("ghost").get().then(doc => {
        if (doc.exists && doc.data().moves) {
            ghostMoves = doc.data().moves;
        } else {
            // fallback: random-walk ghost
            ghostMoves = Array.from({length: 100}, () =>
                ["UP","DOWN","LEFT","RIGHT"][Math.floor(Math.random()*4)]);
        }
    });
}

// ═══════════════════════════════════════════════
//  RENDER (smooth interpolation)
// ═══════════════════════════════════════════════
function render(t) {
    ctx.clearRect(0, 0, SIZE, SIZE);

    // grid dots (subtle)
    ctx.fillStyle = "#0a0a0a";
    for (let gx = 0; gx < COLS; gx++) {
        for (let gy = 0; gy < ROWS; gy++) {
            ctx.fillRect(gx*BOX + BOX/2 - 1, gy*BOX + BOX/2 - 1, 2, 2);
        }
    }

    // ghost snake
    if (ghostSnake.length > 1) {
        for (let i = ghostSnake.length-1; i >= 0; i--) {
            const alpha = 0.12 + (i === 0 ? 0.08 : 0) - (i / ghostSnake.length) * 0.1;
            ctx.fillStyle = `rgba(255,215,0,${Math.max(0.04, alpha)})`;
            ctx.fillRect(ghostSnake[i].x + 2, ghostSnake[i].y + 2, BOX - 5, BOX - 5);
        }
    }

    // food glow
    const pulse = 0.7 + Math.sin(Date.now() / 200) * 0.3;
    ctx.shadowColor = bonusActive ? "#ffd700" : "#ff3131";
    ctx.shadowBlur  = 10 * pulse;
    ctx.fillStyle   = bonusActive ? "#ffd700" : "#ff3131";
    const fs = BOX - 3;
    ctx.fillRect(food.x + 1, food.y + 1, fs, fs);
    ctx.shadowBlur = 0;

    // snake: full-body train interpolation
    // Each segment lerps from its previous position to its current position.
    // This keeps the whole body connected and gap-free.
    const prev = prevSnake || snake;

    for (let i = snake.length - 1; i >= 0; i--) {
        const from = prev[i] || snake[i];
        const to   = snake[i];
        const sx = from.x + (to.x - from.x) * t;
        const sy = from.y + (to.y - from.y) * t;

        const ratio = 1 - i / snake.length;

        if (i === 0) {
            ctx.shadowColor = "#00ff41";
            ctx.shadowBlur  = 8;
            ctx.fillStyle   = "#00ff41";
            ctx.fillRect(sx + 1, sy + 1, BOX - 2, BOX - 2);
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#000";
            const ew = 3, eh = 3;
            if (d==="RIGHT")     { ctx.fillRect(sx+BOX-6, sy+3, ew, eh); ctx.fillRect(sx+BOX-6, sy+BOX-6, ew, eh); }
            else if (d==="LEFT") { ctx.fillRect(sx+3, sy+3, ew, eh); ctx.fillRect(sx+3, sy+BOX-6, ew, eh); }
            else if (d==="UP")   { ctx.fillRect(sx+3, sy+3, ew, eh); ctx.fillRect(sx+BOX-6, sy+3, ew, eh); }
            else                 { ctx.fillRect(sx+3, sy+BOX-6, ew, eh); ctx.fillRect(sx+BOX-6, sy+BOX-6, ew, eh); }
        } else {
            const g = Math.floor(0x8f * ratio);
            ctx.fillStyle = `rgb(0,${g},${Math.floor(17 * ratio)})`;
            ctx.fillRect(sx + 2, sy + 2, BOX - 4, BOX - 4);
        }
        ctx.shadowBlur = 0;
    }
}

// ═══════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════
let lastDirTime = 0;
function handleDir(dir) {
    const now = Date.now();
    if (now - lastDirTime < 80) return;
    lastDirTime = now;

    if (isOver && document.getElementById("over-screen").style.display !== "none") {
        const map = {UP:38, DOWN:40, LEFT:37, RIGHT:39};
        handleNameEntry(map[dir]); return;
    }
    if (!isGameRunning) return;
    if (dir==="UP"    && d!=="DOWN")  nextD="UP";
    if (dir==="DOWN"  && d!=="UP")    nextD="DOWN";
    if (dir==="LEFT"  && d!=="RIGHT") nextD="LEFT";
    if (dir==="RIGHT" && d!=="LEFT")  nextD="RIGHT";
}

document.addEventListener("keydown", e => {
    // name entry mode
    if (isOver && document.getElementById("over-screen").style.display !== "none") {
        // PC: typing letters A-Z
        if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
            initials[charIndex] = e.key.toUpperCase().charCodeAt(0);
            charIndex = Math.min(4, charIndex + 1);
            updateNameUI(); return;
        }
        if (e.key === "Backspace") {
            charIndex = Math.max(0, charIndex - 1);
            initials[charIndex] = 65;
            updateNameUI(); return;
        }
        handleNameEntry(e.keyCode); return;
    }
    // movement
    const map = {ArrowLeft:"LEFT", KeyA:"LEFT", ArrowRight:"RIGHT", KeyD:"RIGHT",
                 ArrowUp:"UP", KeyW:"UP", ArrowDown:"DOWN", KeyS:"DOWN"};
    const dir = map[e.code];
    if (dir) { e.preventDefault(); handleDir(dir); }
});

// ── Name entry ──
function handleNameEntry(key) {
    if (key===38) initials[charIndex] = initials[charIndex]===90 ? 65 : initials[charIndex]+1;
    else if (key===40) initials[charIndex] = initials[charIndex]===65 ? 90 : initials[charIndex]-1;
    else if (key===39) charIndex = Math.min(4, charIndex+1);
    else if (key===37) charIndex = Math.max(0, charIndex-1);
    updateNameUI();
}
function updateNameUI() {
    for (let i=0; i<5; i++) {
        const el = document.getElementById("L"+i);
        el.textContent = String.fromCharCode(initials[i]);
        el.classList.toggle("active", i===charIndex);
    }
}

// ═══════════════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════════════
function startGame() {
    document.getElementById("start-screen").style.display = "none";
    document.getElementById("leaderboard-screen").style.display = "none";
    document.getElementById("over-screen").style.display = "none";
    initVars();
    loadGhostMoves();
    isGameRunning = true;
    cancelAnimationFrame(rafId);
    lastTick = performance.now();
    rafId = requestAnimationFrame(gameFrame);
}

function gameOver() {
    isGameRunning = false;
    isOver = true;
    cancelAnimationFrame(rafId);
    document.getElementById("final-score").innerText = score.toString().padStart(3,"0");
    document.getElementById("over-screen").style.display = "flex";
}

async function saveScore() {
    const playerName = String.fromCharCode(...initials);
    const btn = document.getElementById("save-btn");
    btn.disabled = true;
    btn.innerText = "GUARDANDO...";
    try {
        await db.collection("leaderboard").add({
            name: playerName,
            score: score,
            date: firebase.firestore.FieldValue.serverTimestamp()
        });
        // if new top score, save ghost moves (simplified: last directions)
        if (score > topScore) {
            const moves = Array.from({length: Math.max(20, snake.length)},
                (_,i) => ["RIGHT","UP","LEFT","DOWN"][i%4]); // placeholder
            await db.collection("config").doc("ghost").set({moves, name: playerName, score});
        }
        showLeaderboard();
    } catch {
        alert("Error al conectar.");
        btn.disabled = false;
        btn.innerText = "GUARDAR EN LA NUBE";
    }
}

function showLeaderboard() {
    document.getElementById("start-screen").style.display = "none";
    document.getElementById("over-screen").style.display = "none";
    document.getElementById("leaderboard-screen").style.display = "flex";
    const list = document.getElementById("leaderboard-list");
    list.innerHTML = "";
    if (globalRanking.length === 0) {
        list.innerHTML = "<li><span>---</span><span>000</span></li>";
        setTimeout(showLeaderboard, 600); return;
    }
    const medals = ["🥇","🥈","🥉","④","⑤"];
    globalRanking.forEach((data, i) => {
        const li = document.createElement("li");
        if (i===0) li.classList.add("gold-row");
        li.innerHTML = `<span><span class="rank">${medals[i]}</span>${data.name}</span><span>${data.score.toString().padStart(3,"0")}</span>`;
        list.appendChild(li);
    });
}

function resetToStart() {
    isGameRunning = false;
    isOver = false;
    cancelAnimationFrame(rafId);
    document.getElementById("leaderboard-screen").style.display = "none";
    document.getElementById("over-screen").style.display = "none";
    document.getElementById("start-screen").style.display = "flex";
    document.getElementById("game-wrapper").classList.remove("wall-warn","record-flash");
    ctx.clearRect(0, 0, SIZE, SIZE);
}
</script>
</body>
</html>
