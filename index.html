<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nigga snake</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            color: #00ff41;
            overflow: hidden;
        }
        
        #game-wrapper { 
            position: relative; 
            border: 4px solid #00ff41; 
            background: #000; 
            box-shadow: 0 0 20px #00ff41; 
        }
        
        canvas { display: block; background: #000; }
        
        /* Capas sobre el juego (Menús) */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10; text-align: center;
        }
        
        h1 { font-size: 36px; margin-bottom: 20px; text-shadow: 0 0 10px #00ff41; }
        
        .btn {
            background: transparent; border: 2px solid #00ff41; color: #00ff41;
            padding: 10px 20px; font-size: 18px; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-weight: bold; margin-top: 10px;
        }
        .btn:hover { background: #00ff41; color: #000; }
        .btn:disabled { border-color: #333; color: #333; cursor: not-allowed; }

        .btn-rojo {
            border-color: #ff3131; color: #ff3131; margin-top: 15px;
        }
        .btn-rojo:hover {
            background: #ff3131; color: #000;
        }

        /* Ingreso de Nombre */
        .name-entry { display: flex; gap: 15px; margin: 20px 0; }
        .letter-box {
            width: 40px; height: 50px; border-bottom: 4px solid #00ff41;
            font-size: 36px; display: flex; align-items: center; justify-content: center;
        }

        /* Tabla de Puntuaciones */
        #leaderboard-list {
            list-style: none; margin: 20px 0; width: 80%; text-align: left;
        }
        #leaderboard-list li {
            display: flex; justify-content: space-between; font-size: 20px; margin-bottom: 10px;
            border-bottom: 1px dashed #00ff41; padding-bottom: 5px;
        }

        /* Controles Táctiles */
        #controls { display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; margin-top: 20px; }
        .ctrl-btn {
            width: 60px; height: 60px; background: #111; border: 2px solid #333;
            color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 24px; border-radius: 50%; cursor: pointer; touch-action: manipulation;
        }
        .ctrl-btn:active { background: #00ff41; color: #000; border-color: #00ff41; }
        #up { grid-column: 2; }
        #left { grid-column: 1; }
        #right { grid-column: 3; }
        #down { grid-column: 2; }
    </style>
</head>
<body>

    <div id="score-board" style="font-size: 24px; margin-bottom: 10px;">SCORE: <span id="val">000</span></div>

    <div id="game-wrapper">
        <canvas id="game" width="400" height="400"></canvas>

        <div id="start-screen" class="overlay">
            <h1>SNAKE ARCADE</h1>
            <button class="btn" onclick="showLeaderboard()">VER RANKING GLOBAL</button>
            <button class="btn" onclick="startGame()">INSERT COIN (START)</button>
        </div>

        <div id="over-screen" class="overlay" style="display: none;">
            <h1 style="color: #ff3131; text-shadow: 0 0 10px #ff3131;">GAME OVER</h1>
            <p>PUNTUACIÓN: <span id="final-score">0</span></p>
            <div class="name-entry">
                <div class="letter-box" id="L0">A</div>
                <div class="letter-box" id="L1">A</div>
                <div class="letter-box" id="L2">A</div>
            </div>
            <p style="font-size: 12px; margin-bottom: 10px;">USA LAS FLECHAS PARA CAMBIAR LETRAS</p>
            <button class="btn" id="save-btn" onclick="saveScore()">GUARDAR EN LA NUBE</button>
            <button class="btn btn-rojo" onclick="resetToStart()">SALIR SIN GUARDAR</button>
        </div>

        <div id="leaderboard-screen" class="overlay" style="display: none;">
            <h1>TOP 5 GLOBAL</h1>
            <ul id="leaderboard-list">
                </ul>
            <button class="btn" onclick="resetToStart()">VOLVER</button>
        </div>
    </div>

    <div id="controls">
        <div class="ctrl-btn" id="up" onmousedown="handleTouch('UP')" ontouchstart="handleTouch('UP')">↑</div>
        <div class="ctrl-btn" id="left" onmousedown="handleTouch('LEFT')" ontouchstart="handleTouch('LEFT')">←</div>
        <div class="ctrl-btn" id="right" onmousedown="handleTouch('RIGHT')" ontouchstart="handleTouch('RIGHT')">→</div>
        <div class="ctrl-btn" id="down" onmousedown="handleTouch('DOWN')" ontouchstart="handleTouch('DOWN')">↓</div>
    </div>

    <script>
        // =========================================================================
        // CONFIGURACIÓN DE FIREBASE Y PRE-CARGA DE DATOS
        // =========================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBbhPYtbU3ZWBEY3-ys0wsealIyBTWxt7Y",
            authDomain: "snakescore-37662.firebaseapp.com",
            projectId: "snakescore-37662",
            storageBucket: "snakescore-37662.firebasestorage.app",
            messagingSenderId: "1068045159602",
            appId: "1:1068045159602:web:8a08d2e012a8d0ea5a0dab"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. Activar caché local para respuestas ultrarrápidas
        db.enablePersistence().catch((err) => {
            console.warn("La persistencia de caché falló:", err);
        });

        // 2. Pre-carga en tiempo real del Ranking Global
        let globalRanking = []; 
        db.collection("leaderboard")
          .orderBy("score", "desc")
          .limit(5)
          .onSnapshot((snapshot) => {
              globalRanking = [];
              snapshot.forEach(doc => {
                  globalRanking.push(doc.data());
              });
          });
        // =========================================================================

        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const box = 20;
        
        // Ajuste para móviles
        const size = Math.min(window.innerWidth - 30, 400);
        canvas.width = size - (size % box);
        canvas.height = size - (size % box);

        let snake, food, score, gameLoop, d;
        let isOver = false;
        
        // Variables de Arcade Name Entry
        let charIndex = 0;
        let initials = [65, 65, 65]; // Códigos ASCII para A, A, A

        function initVars() {
            snake = [{x: Math.floor((canvas.width/box)/2) * box, y: Math.floor((canvas.height/box)/2) * box}];
            score = 0;
            d = "RIGHT";
            isOver = false;
            charIndex = 0;
            initials = [65, 65, 65];
            document.getElementById("val").innerText = "000";
            document.getElementById("save-btn").disabled = false;
            document.getElementById("save-btn").innerText = "GUARDAR EN LA NUBE";
            updateNameUI();
            spawnFood();
        }

        function spawnFood() {
            let cols = canvas.width / box;
            let rows = canvas.height / box;
            food = {
                x: Math.floor(Math.random() * cols) * box,
                y: Math.floor(Math.random() * rows) * box
            };
        }

        // --- SISTEMA DE CONTROLES UNIFICADO ---
        document.addEventListener("keydown", (e) => {
            if(isOver && document.getElementById("over-screen").style.display !== "none") {
                handleNameEntry(e.keyCode);
                return;
            }
            if(e.keyCode == 37 || e.keyCode == 65) handleTouch('LEFT');
            if(e.keyCode == 38 || e.keyCode == 87) handleTouch('UP');
            if(e.keyCode == 39 || e.keyCode == 68) handleTouch('RIGHT');
            if(e.keyCode == 40 || e.keyCode == 83) handleTouch('DOWN');
        });

        function handleTouch(dir) {
            if (isOver && document.getElementById("over-screen").style.display !== "none") {
                if (dir === 'UP') handleNameEntry(38);
                if (dir === 'DOWN') handleNameEntry(40);
                if (dir === 'LEFT') handleNameEntry(37);
                if (dir === 'RIGHT') handleNameEntry(39);
                return;
            }

            if (!isOver) {
                if (dir === 'UP' && d !== "DOWN") d = "UP";
                if (dir === 'DOWN' && d !== "UP") d = "DOWN";
                if (dir === 'LEFT' && d !== "RIGHT") d = "LEFT";
                if (dir === 'RIGHT' && d !== "LEFT") d = "RIGHT";
            }
        }

        // --- LÓGICA DEL JUEGO ---
        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00ff41" : "#008f11";
                ctx.fillRect(snake[i].x, snake[i].y, box - 1, box - 1);
            }

            ctx.fillStyle = "#ff3131";
            ctx.fillRect(food.x, food.y, box - 1, box - 1);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if(d == "LEFT") snakeX -= box;
            if(d == "UP") snakeY -= box;
            if(d == "RIGHT") snakeX += box;
            if(d == "DOWN") snakeY += box;

            if(snakeX == food.x && snakeY == food.y) {
                score += 10;
                document.getElementById("val").innerText = score.toString().padStart(3, '0');
                spawnFood();
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                gameOver();
                return;
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function startGame() {
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("leaderboard-screen").style.display = "none";
            document.getElementById("over-screen").style.display = "none";
            initVars();
            clearInterval(gameLoop);
            gameLoop = setInterval(draw, 120);
        }

        function gameOver() {
            clearInterval(gameLoop);
            isOver = true;
            document.getElementById("final-score").innerText = score.toString().padStart(3, '0');
            document.getElementById("over-screen").style.display = "flex";
        }

        // --- INGRESO DE NOMBRE (ARCADE) ---
        function handleNameEntry(key) {
            if(key == 38) {
                initials[charIndex] = initials[charIndex] == 90 ? 65 : initials[charIndex] + 1;
            } else if(key == 40) {
                initials[charIndex] = initials[charIndex] == 65 ? 90 : initials[charIndex] - 1;
            } else if(key == 39) {
                charIndex = (charIndex + 1) % 3;
            } else if(key == 37) {
                charIndex = charIndex == 0 ? 2 : charIndex - 1;
            }
            updateNameUI();
        }

        function updateNameUI() {
            for(let i=0; i<3; i++) {
                let el = document.getElementById("L"+i);
                el.innerText = String.fromCharCode(initials[i]);
                el.style.color = (i == charIndex) ? "#fff" : "#00ff41";
                el.style.borderColor = (i == charIndex) ? "#fff" : "#00ff41";
            }
        }

        // --- CONEXIÓN REAL CON GOOGLE FIREBASE CLOUD FIRESTORE ---
        async function saveScore() {
            const playerName = String.fromCharCode(initials[0], initials[1], initials[2]);
            const saveBtn = document.getElementById("save-btn");
            
            saveBtn.disabled = true;
            saveBtn.innerText = "GUARDANDO...";

            try {
                // Añadimos el nuevo récord
                await db.collection("leaderboard").add({
                    name: playerName,
                    score: score,
                    date: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Mostrar el ranking instantáneo
                showLeaderboard();
            } catch (error) {
                console.error("Error al guardar en Firebase:", error);
                alert("Hubo un problema al conectar con la nube.");
                saveBtn.disabled = false;
                saveBtn.innerText = "GUARDAR EN LA NUBE";
            }
        }

        // Función actualizada para usar los datos pre-cargados
        function showLeaderboard() {
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("over-screen").style.display = "none";
            
            const list = document.getElementById("leaderboard-list");
            list.innerHTML = ""; 
            document.getElementById("leaderboard-screen").style.display = "flex";
            
            // Si la conexión a internet es lenta y aún no llega el primer paquete
            if(globalRanking.length === 0) {
                list.innerHTML = "<li><span>---</span> <span>000</span></li>";
                setTimeout(showLeaderboard, 500); // Reintenta en medio segundo
                return;
            }
            
            // Dibujamos el ranking instantáneamente desde la variable global
            globalRanking.forEach(data => {
                let li = document.createElement("li");
                li.innerHTML = `<span>${data.name}</span> <span>${data.score.toString().padStart(3, '0')}</span>`;
                list.appendChild(li);
            });
        }

        // --- FUNCIÓN MODIFICADA PARA OCULTAR LA PANTALLA DE GAME OVER ---
        function resetToStart() {
            document.getElementById("leaderboard-screen").style.display = "none";
            document.getElementById("over-screen").style.display = "none"; // Se asegura de ocultar Game Over
            document.getElementById("start-screen").style.display = "flex";
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

    </script>
</body>
</html>
