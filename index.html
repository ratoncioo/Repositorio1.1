<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Arcade Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            color: #00ff41;
            overflow: hidden;
        }
        #game-wrapper { position: relative; border: 4px solid #00ff41; background: #000; box-shadow: 0 0 20px #00ff41; }
        canvas { display: block; background: #000; }
        
        /* Overlays */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10; text-align: center;
        }
        h1 { font-size: 40px; margin-bottom: 20px; text-shadow: 0 0 10px #00ff41; }
        .btn {
            background: transparent; border: 2px solid #00ff41; color: #00ff41;
            padding: 10px 30px; font-size: 20px; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-weight: bold;
        }
        .btn:hover { background: #00ff41; color: #000; }

        /* Name Entry */
        .name-entry { display: flex; gap: 10px; margin: 20px 0; }
        .letter-box {
            width: 50px; height: 60px; border-bottom: 4px solid #00ff41;
            font-size: 40px; display: flex; align-items: center; justify-content: center;
        }

        /* Controls */
        #controls { display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; margin-top: 20px; }
        .ctrl-btn {
            width: 60px; height: 60px; background: #111; border: 2px solid #333;
            color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 24px; border-radius: 50%; cursor: pointer;
        }
        .ctrl-btn:active { background: #00ff41; color: #000; }
        #up { grid-column: 2; }
        #left { grid-column: 1; }
        #right { grid-column: 3; }
        #down { grid-column: 2; }
    </style>
</head>
<body>

    <div id="score-board" style="font-size: 24px; margin-bottom: 10px;">SCORE: <span id="val">000</span></div>

    <div id="game-wrapper">
        <canvas id="game" width="400" height="400"></canvas>

        <div id="start-screen" class="overlay">
            <h1>SNAKE ARCADE</h1>
            <button class="btn" onclick="startGame()">PRESS START</button>
        </div>

        <div id="over-screen" class="overlay" style="display: none;">
            <h1 style="color: #ff3131;">GAME OVER</h1>
            <p>TU PUNTUACIÓN: <span id="final-score">0</span></p>
            <div class="name-entry">
                <div class="letter-box" id="L0">A</div>
                <div class="letter-box" id="L1">A</div>
                <div class="letter-box" id="L2">A</div>
            </div>
            <p style="font-size: 12px;">USA FLECHAS PARA CAMBIAR LETRAS</p>
            <button class="btn" style="margin-top:20px" onclick="location.reload()">REINTENTAR</button>
        </div>
    </div>

    <div id="controls">
        <div class="ctrl-btn" id="up">↑</div>
        <div class="ctrl-btn" id="left">←</div>
        <div class="ctrl-btn" id="right">→</div>
        <div class="ctrl-btn" id="down">↓</div>
    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const box = 20;
        let snake, food, score, game, d;
        let isOver = false;
        let charIndex = 0;
        let initials = [65, 65, 65]; // A, A, A

        function initVars() {
            snake = [{x: 9 * box, y: 10 * box}];
            food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };
            score = 0;
            d = "RIGHT";
            isOver = false;
            document.getElementById("val").innerText = "000";
        }

        document.addEventListener("keydown", direction);
        function direction(event) {
            if(isOver) {
                handleNameEntry(event.keyCode);
                return;
            }
            let key = event.keyCode;
            if((key == 37 || key == 65) && d != "RIGHT") d = "LEFT";
            else if((key == 38 || key == 87) && d != "DOWN") d = "UP";
            else if((key == 39 || key == 68) && d != "LEFT") d = "RIGHT";
            else if((key == 40 || key == 83) && d != "UP") d = "DOWN";
        }

        // Touch Controls
        const setD = (newD) => { if(!isOver) d = newD; };
        document.getElementById("up").onclick = () => { if(d!="DOWN") d="UP"; };
        document.getElementById("down").onclick = () => { if(d!="UP") d="DOWN"; };
        document.getElementById("left").onclick = () => { if(d!="RIGHT") d="LEFT"; };
        document.getElementById("right").onclick = () => { if(d!="LEFT") d="RIGHT"; };

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00ff41" : "#008f11";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "black";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "red";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            if(snakeX == food.x && snakeY == food.y) {
                score++;
                document.getElementById("val").innerText = score.toString().padStart(3, '0');
                food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                gameOver();
                return;
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function startGame() {
            document.getElementById("start-screen").style.display = "none";
            initVars();
            game = setInterval(draw, 100);
        }

        function gameOver() {
            clearInterval(game);
            isOver = true;
            document.getElementById("final-score").innerText = score;
            document.getElementById("over-screen").style.display = "flex";
        }

        function handleNameEntry(key) {
            if(key == 38) { // Up
                initials[charIndex] = initials[charIndex] == 90 ? 65 : initials[charIndex] + 1;
            } else if(key == 40) { // Down
                initials[charIndex] = initials[charIndex] == 65 ? 90 : initials[charIndex] - 1;
            } else if(key == 39 || key == 13) { // Right or Enter
                charIndex = (charIndex + 1) % 3;
            } else if(key == 37) { // Left
                charIndex = charIndex == 0 ? 2 : charIndex - 1;
            }
            updateNameUI();
        }

        function updateNameUI() {
            for(let i=0; i<3; i++) {
                let el = document.getElementById("L"+i);
                el.innerText = String.fromCharCode(initials[i]);
                el.style.color = (i == charIndex) ? "#fff" : "#00ff41";
                el.style.borderColor = (i == charIndex) ? "#fff" : "#00ff41";
            }
        }

        initVars();
    </script>
</body>
</html>
